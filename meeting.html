<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聚會紀錄</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%96%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container" id="app">
<div class="header">
  <a href="javascript:history.length>1?history.back():location.href='index.html'" class="back-link">← 返回列表</a>
  <div id="themeSlot"></div>
</div>
<div id="root"><div class="loading">載入中...</div></div>
</div>

<!-- 留言面板 -->
<div class="comment-panel" id="commentPanel">
  <div class="cp-header">
    <h3>💬 心得回饋</h3>
    <span class="cp-folder-name" id="cpFolderName"></span>
    <button class="cp-close" id="cpClose">✕</button>
  </div>
  <div class="cp-list" id="cpList"><div class="cp-loading">載入中…</div></div>
  <div class="cp-form">
    <input type="text" id="cpName" placeholder="你的名字（可不填）" maxlength="20">
    <textarea id="cpText" placeholder="寫下你的心得或回響…" maxlength="500"></textarea>
    <button class="cp-submit" id="cpSubmit">送出心得</button>
  </div>
</div>

<!-- Share toast -->
<div class="share-toast" id="shareToast">🔗 連結已複製！</div>

<script src="api.js"></script>
<script src="meeting.js"></script>
</body>
</html>
