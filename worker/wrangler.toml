name = "church-meeting-api"
main = "src/index.js"
compatibility_date = "2024-09-01"
account_id = "8e2eb47cb86e3cfb953c89dd148b6137"

[vars]
# 用寫死版本名稱避免 "*-latest" alias 偶爾指到區域沒部署的版本造成 503
GEMINI_MODEL = "gemini-2.5-flash"
CONFIG_SHEET_ID = "1F7fP03oexK4lrerV-hRHM1ooKirwZnuguCerGK6jogo"
# Free tier 限 50 subrequest/invocation：每檔處理用 ~25 個 subrequest + cron 預載 ~8 個 ≈ 33
# 第 2 個檔就會爆「Too many subrequests」→ 一次 cron 只跑 1 個檔
QUOTA_PER_RUN = "1"

# 排程：每天 06:30 + 12:30 + 17:30 + 21:30 Asia/Taipei（UTC 22:30前夜 + 04:30 + 09:30 + 13:30）
# 4 次 cron × 每次 1 檔 = 一天最多 4 檔自動處理
# 教會檔多時可手動到 meeting 頁按處理（每按一次走獨立 invocation，不受 cron 額度限制）
# Cron 格式：minute hour day-of-month month day-of-week（時間都是 UTC）
[triggers]
crons = ["30 22 * * *", "30 4 * * *", "30 7 * * *", "30 13 * * *"]

# KV：手動轉錄排隊（建立後填入 id）
# 建立指令：npx wrangler kv namespace create PROCESS_QUEUE
[[kv_namespaces]]
binding = "PROCESS_QUEUE"
id = "daa2816cade04632a507af8082dff906"

# 啟用 Workers Logs（持久化 log，可在 Dashboard → Observability → Logs 查詢）
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

# Secrets（不寫在這裡，用 Dashboard 或以下指令設定）：
#   npx wrangler secret put SERVICE_ACCOUNT_KEY
#   npx wrangler secret put NOTION_TOKEN
#   npx wrangler secret put NOTION_DATABASE_ID
#   npx wrangler secret put GEMINI_API_KEY
#   npx wrangler secret put DRIVE_FOLDER_ID
#
# 也可選填限制 CORS 來源：
#   npx wrangler secret put ALLOWED_ORIGIN
